<!DOCTYPE html>
<html>
<head>
  <title>Manage Isibo Leaders</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9fbff;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #003366;
    }
    form, .leaders-list {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #007f3f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .leader {
      border-left: 5px solid #0033a0;
      background: #eef5ff;
      padding: 10px;
      margin-top: 10px;
    }
    .leader button {
      margin-right: 10px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    #message {
      text-align: center;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h2>Manage Abakuru b’Isibo</h2>

<form id="isiboForm">
  <label>Full Name</label>
  <input type="text" id="full_name" required>

  <label>Isibo Name</label>
  <input type="text" id="isibo" required>

  <label>Phone Number</label>
  <input type="text" id="phone" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <button type="submit">Save Isibo Leader</button>
  <div id="message"></div>
</form>

<div class="leaders-list" id="leadersContainer">Loading isibo leaders...</div>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user || user.role !== 'admin') {
    alert('Access denied: Admins only');
    window.location.href = 'index.html';
  }

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  let editingId = null;

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, tag => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[tag]));
  }

  async function loadLeaders() {
    try {
      const res = await fetch(`${API_URL}/isibo_leaders`);
      const data = await res.json();
      const container = document.getElementById('leadersContainer');
      if (!Array.isArray(data) || data.length === 0) {
        container.textContent = 'No isibo leaders found yet.';
        return;
      }
      container.innerHTML = data.map(i => `
        <div class="leader">
          <strong>${escapeHTML(i.full_name)}</strong><br>
          🏘️ Isibo: ${escapeHTML(i.isibo)}<br>
          📞 ${escapeHTML(i.phone)}<br>
          ✉️ ${escapeHTML(i.email)}<br>
          <button onclick="editLeader(${i.id}, '${escapeHTML(i.full_name)}', '${escapeHTML(i.isibo)}', '${escapeHTML(i.phone)}', '${escapeHTML(i.email)}')">📝 Edit</button>
          <button onclick="deleteLeader(${i.id})" style="background:red;">🗑️ Delete</button>
        </div>
      `).join('');
    } catch {
      document.getElementById('leadersContainer').textContent = '❌ Failed to load isibo leaders.';
    }
  }

  function editLeader(id, full_name, isibo, phone, email) {
    editingId = id;
    document.getElementById('full_name').value = full_name;
    document.getElementById('isibo').value = isibo;
    document.getElementById('phone').value = phone;
    document.getElementById('email').value = email;
    document.querySelector('button[type="submit"]').textContent = 'Update Isibo Leader';
  }

  async function deleteLeader(id) {
    if (!confirm('Delete this isibo leader?')) return;
    try {
      const res = await fetch(`${API_URL}/isibo_leaders/${id}`, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error();
      loadLeaders();
    } catch {
      alert('❌ Failed to delete leader.');
    }
  }

  document.getElementById('isiboForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = document.getElementById('message');

    const data = {
      full_name: document.getElementById('full_name').value.trim(),
      isibo: document.getElementById('isibo').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim()
    };

    const method = editingId ? 'PUT' : 'POST';
    const url = editingId
      ? `${API_URL}/isibo_leaders/${editingId}`
      : `${API_URL}/isibo_leaders`;

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!res.ok) throw new Error();
      message.style.color = 'green';
      message.textContent = editingId
        ? '✅ Isibo leader updated!'
        : '✅ Isibo leader saved!';
      e.target.reset();
      editingId = null;
      document.querySelector('button[type="submit"]').textContent = 'Save Isibo Leader';
      loadLeaders();
    } catch {
      message.style.color = 'red';
      message.textContent = '❌ Failed to save/update leader.';
    }
  });

  loadLeaders();
</script>

</body>
</html>
