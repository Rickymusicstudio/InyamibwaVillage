<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📊 Umudugudu Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f4f9f7;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #263ea0;
      color: white;
    }

    h1 {
      margin: 0;
    }

    .dashboard {
      max-width: 1000px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      text-align: center;
      border-top: 6px solid #f4d600;
    }

    .card h2 {
      margin: 0;
      font-size: 2.5rem;
      color: #007f3f;
    }

    .card p {
      margin-top: 10px;
      font-weight: bold;
      color: #263ea0;
    }

    section {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
    }

    h3 {
      margin-top: 0;
      color: #003366;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #error {
      text-align: center;
      margin-top: 20px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Umudugudu Dashboard</h1>
</header>

<div class="dashboard" id="dashboardStats"></div>

<section id="irondoDay">
  <h3>☀️ Day Shift Irondo Members</h3>
  <ul id="dayList">Loading...</ul>
</section>

<section id="irondoNight">
  <h3>🌙 Night Shift Irondo Members</h3>
  <ul id="nightList">Loading...</ul>
</section>

<div id="error"></div>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user || user.role !== 'admin') {
    alert('Access denied: Admins only');
    window.location.href = 'index.html';
  }

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  async function loadStats() {
    try {
      const res = await fetch(`${API_URL}/stats`);
      const stats = await res.json();
      const container = document.getElementById('dashboardStats');
      container.innerHTML = `
        <div class="card"><h2>${stats.residents}</h2><p>Residents</p></div>
        <div class="card"><h2>${stats.house_helpers}</h2><p>House Helpers</p></div>
        <div class="card"><h2>${stats.thoughts}</h2><p>Thoughts</p></div>
        <div class="card"><h2>${stats.updates}</h2><p>Updates</p></div>
      `;
    } catch {
      document.getElementById('error').textContent = '❌ Failed to load stats.';
    }
  }

  async function loadIrondoTeam(shift, containerId) {
    try {
      const res = await fetch(`${API_URL}/irondo_team/${shift}`);
      const team = await res.json();
      const ul = document.getElementById(containerId);
      if (!Array.isArray(team) || team.length === 0) {
        ul.innerHTML = `<li>No ${shift} shift members found.</li>`;
        return;
      }

      ul.innerHTML = team.map(member =>
        `<li><strong>${member.full_name}</strong> — ${member.phone || 'N/A'}</li>`
      ).join('');
    } catch {
      document.getElementById(containerId).innerHTML = `<li>❌ Failed to load ${shift} shift.</li>`;
    }
  }

  loadStats();
  loadIrondoTeam('day', 'dayList');
  loadIrondoTeam('night', 'nightList');
</script>

</body>
</html>
