<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact - Inyamibwa</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #e9f8ee;
    }

    header {
      background: #263ea0;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #1d2e75;
      padding: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar {
      display: flex;
      justify-content: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 20px;
    }

    .navbar a {
      background-color: #263ea0;
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .navbar a:hover {
      background-color: #1b2a70;
      color: white;
    }

    section {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
      border-radius: 12px;
      border-top: 6px solid #f4d600;
      box-shadow: 0 0 12px rgba(0,0,0,0.05);
    }

    h2 {
      color: #263ea0;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px 15px;
      border: 1px solid #ccc;
      text-align: left;
    }

    th {
      background-color: #263ea0;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>

<header>
  <h1>Contact Residents</h1>
</header>

<nav>
  <ul class="navbar">
    <li><a href="dashboard.html">Ahabanza</a></li>
    <li><a href="inyamibwa_residents.html">Abatuye Umudugudu</a></li>
    <li><a href="security.html">Umutekano</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="thoughts.html">Ibitekerezo</a></li>
  </ul>
</nav>

<section>
  <h2>📇 Residents Contact Info</h2>
  <table id="contactsTable">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Phone</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody>
      <!-- Contacts will load here -->
    </tbody>
  </table>
</section>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user) window.location.href = 'index.html';

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  async function loadContacts() {
    try {
      const res = await fetch(`${API_URL}/residents`, {
        headers: { 'x-role': user.role || 'admin' }
      });
      const data = await res.json();
      const tbody = document.querySelector('#contactsTable tbody');
      tbody.innerHTML = '';

      const filtered = data.filter(r => r.phone || r.phone_number || r.email);
      filtered.forEach(resident => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${resident.names || resident.full_name || '-'}</td>
          <td>${resident.phone || resident.phone_number || 'N/A'}</td>
          <td>${resident.email || 'N/A'}</td>
        `;
        tbody.appendChild(row);
      });
    } catch {
      document.querySelector('#contactsTable tbody').innerHTML =
        '<tr><td colspan="3">❌ Failed to load contact list.</td></tr>';
    }
  }

  loadContacts();
</script>

</body>
</html>
