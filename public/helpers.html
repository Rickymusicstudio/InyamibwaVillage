<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>House Helpers - Inyamibwa Cell</title>
  <style>
    /* ... same CSS as you had, unchanged for brevity ... */
  </style>
</head>
<body>

<h2>🧹 Register House Helper</h2>

<form id="helperForm">
  <label>Full Name</label>
  <input type="text" id="full_name" required>

  <label>National ID</label>
  <input type="text" id="national_id">

  <label>Phone Number</label>
  <input type="text" id="phone_number">

  <label>Works for House</label>
  <input type="text" id="works_for_house" required>

  <label>Isibo</label>
  <input type="text" id="isibo" required>

  <button type="submit">Save Helper</button>
  <div id="message"></div>
</form>

<h2>Registered Helpers</h2>

<button class="export-btn" onclick="exportHelpersToCSV()">📥 Export Helpers to CSV</button>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Full Name</th>
      <th>National ID</th>
      <th>Phone</th>
      <th>House</th>
      <th>Isibo</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="helpersTable">
    <!-- Data loads here -->
  </tbody>
</table>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user || user.role !== 'admin') {
    alert('Access denied: Admins only');
    window.location.href = 'index.html';
  }

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  const form = document.getElementById('helperForm');
  const message = document.getElementById('message');
  const table = document.getElementById('helpersTable');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      full_name: document.getElementById('full_name').value.trim(),
      national_id: document.getElementById('national_id').value.trim(),
      phone_number: document.getElementById('phone_number').value.trim(),
      works_for_house: document.getElementById('works_for_house').value.trim(),
      isibo: document.getElementById('isibo').value.trim()
    };

    try {
      const res = await fetch(`${API_URL}/helpers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!res.ok) throw new Error();
      message.style.color = 'green';
      message.textContent = '✅ Helper saved!';
      form.reset();
      loadHelpers();
    } catch {
      message.style.color = 'red';
      message.textContent = '❌ Failed to save helper.';
    }
  });

  async function loadHelpers() {
    try {
      const res = await fetch(`${API_URL}/helpers`);
      const data = await res.json();
      table.innerHTML = '';

      data.forEach(h => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${h.id}</td>
          <td>${h.full_name}</td>
          <td>${h.national_id || '-'}</td>
          <td>${h.phone_number || '-'}</td>
          <td>${h.works_for_house}</td>
          <td>${h.isibo}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editHelper(${h.id})">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteHelper(${h.id})">Delete</button>
          </td>
        `;
        table.appendChild(row);
      });
    } catch {
      table.innerHTML = '<tr><td colspan="7">❌ Failed to load helpers.</td></tr>';
    }
  }

  async function deleteHelper(id) {
    if (!confirm('Are you sure you want to delete this helper?')) return;
    try {
      await fetch(`${API_URL}/helpers/${id}`, { method: 'DELETE' });
      loadHelpers();
    } catch {
      alert('❌ Error deleting helper.');
    }
  }

  async function editHelper(id) {
    const row = Array.from(document.querySelectorAll('#helpersTable tr'))
      .find(r => r.querySelector('td')?.textContent == id);
    if (!row) return;

    const full_name = prompt('Edit full name:', row.children[1].textContent);
    const national_id = prompt('Edit national ID:', row.children[2].textContent);
    const phone_number = prompt('Edit phone number:', row.children[3].textContent);
    const works_for_house = prompt('Edit house number:', row.children[4].textContent);
    const isibo = prompt('Edit isibo:', row.children[5].textContent);

    if (!full_name || !works_for_house || !isibo) {
      alert('❌ Full name, house and isibo are required.');
      return;
    }

    try {
      const res = await fetch(`${API_URL}/helpers/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name, national_id, phone_number, works_for_house, isibo })
      });

      if (!res.ok) throw new Error();
      alert('✅ Helper updated successfully.');
      loadHelpers();
    } catch (err) {
      console.error(err);
      alert('❌ Failed to update helper.');
    }
  }

  function exportHelpersToCSV() {
    fetch(`${API_URL}/helpers`)
      .then(res => res.json())
      .then(data => {
        if (!data.length) return alert('No helper data to export.');
        const headers = Object.keys(data[0]);
        const rows = [headers.join(',')];

        data.forEach(row => {
          const csvRow = headers.map(key =>
            `"${(row[key] ?? '').toString().replace(/"/g, '""')}"`
          );
          rows.push(csvRow.join(','));
        });

        const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', 'helpers_export.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      })
      .catch(err => {
        console.error(err);
        alert('❌ Failed to export CSV.');
      });
  }

  loadHelpers();
</script>

</body>
</html>
