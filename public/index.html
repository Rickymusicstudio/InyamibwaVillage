<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to Umudugudu w’Inyamibwa</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e9f8ee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      max-width: 420px;
      width: 100%;
      text-align: center;
      border-top: 8px solid #263ea0;
    }

    h1 {
      color: #263ea0;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 2px solid #f4d600;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }

    .register-link {
      display: block;
      margin-top: 20px;
      color: #004080;
      text-decoration: none;
      font-weight: bold;
    }

    .register-link:hover {
      text-decoration: underline;
    }

    #message {
      color: red;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <form id="loginForm">
    <h1>Umudugudu w’Inyamibwa</h1>
    <p>Please log in to access your dashboard</p>

    <input type="text" id="nid" placeholder="National ID" required />
    <input type="password" id="password" placeholder="Password" required />

    <button type="submit">Login</button>

    <div id="message"></div>

    <a href="register.html" class="register-link">Not registered yet? Click here</a>
  </form>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const national_id = document.getElementById('nid').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://127.0.0.1:5000/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ national_id, password })
        });

        const result = await res.json();

        if (!res.ok) {
          message.textContent = result.error || 'Login failed';
          return;
        }

        localStorage.setItem('loggedUser', JSON.stringify(result));

        if (result.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }

      } catch (err) {
        message.textContent = '❌ Failed to reach server.';
      }
    });
  </script>

</body>
</html>
