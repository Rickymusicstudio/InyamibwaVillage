<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Umutekano - Irondo Team</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #e9f8ee;
    }

    header {
      background: #263ea0;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #1d2e75;
      padding: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar {
      display: flex;
      justify-content: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 20px;
    }

    .navbar a {
      background-color: #263ea0;
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .navbar a:hover {
      background-color: #1b2a70;
      color: white;
    }

    section {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 900px;
      border-radius: 12px;
      border-top: 6px solid #f4d600;
      box-shadow: 0 0 12px rgba(0,0,0,0.05);
    }

    h2 {
      color: #263ea0;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px 15px;
      border: 1px solid #ccc;
      text-align: left;
    }

    th {
      background-color: #263ea0;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>

<header>
  <h1>Umutekano - Irondo Team</h1>
</header>

<nav>
  <ul class="navbar">
    <li><a href="dashboard.html">Ahabanza</a></li>
    <li><a href="inyamibwa_residents.html">Abatuye Umudugudu</a></li>
    <li><a href="security.html">Umutekano</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="thoughts.html">Ibitekerezo</a></li>
  </ul>
</nav>

<section>
  <h2>🛡️ Irondo Team Contacts</h2>
  <table id="irondoTable">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Phone Number</th>
        <th>Shift</th>
      </tr>
    </thead>
    <tbody>
      <!-- Team data will load here -->
    </tbody>
  </table>
</section>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user) window.location.href = 'index.html';

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  async function loadIrondoTeam() {
    try {
      const res = await fetch(`${API_URL}/irondo_team`);
      const team = await res.json();
      const tbody = document.querySelector('#irondoTable tbody');
      tbody.innerHTML = '';

      team.forEach(member => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${member.name || member.full_name || 'N/A'}</td>
          <td>${member.phone || member.phone_number || 'N/A'}</td>
          <td>${member.shift || member.shift_type || 'N/A'}</td>
        `;
        tbody.appendChild(row);
      });
    } catch (err) {
      document.querySelector('#irondoTable tbody').innerHTML =
        '<tr><td colspan="3">❌ Failed to load Irondo team data.</td></tr>';
    }
  }

  loadIrondoTeam();
</script>

</body>
</html>
