<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resident Thoughts</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #d1f0df;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #0033a0;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #1d2e75;
      padding: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .navbar {
      display: flex;
      justify-content: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 20px;
    }

    .navbar a {
      background-color: #263ea0;
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .navbar a:hover {
      background-color: #1b2a70;
    }

    h2 {
      text-align: center;
      color: #003366;
      margin-top: 20px;
    }

    form, .thoughts-box {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #007f3f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }

    .thought {
      padding: 10px;
      margin-top: 15px;
      background: #eef5ff;
      border-left: 5px solid #0033a0;
    }

    #feedback {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Inyamibwa Cell – Ibitekerezo</h1>
</header>

<nav>
  <ul class="navbar">
    <li><a href="dashboard.html">Ahabanza</a></li>
    <li><a href="inyamibwa_residents.html">Abatuye Umudugudu</a></li>
    <li><a href="security.html">Umutekano</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="thoughts.html">Ibitekerezo</a></li>
  </ul>
</nav>

<h2>💬 Share a Thought with the Community</h2>

<form id="thoughtForm">
  <textarea id="thoughtText" placeholder="Type your message here..."></textarea>
  <button type="submit">Post Thought</button>
  <div id="feedback"></div>
</form>

<div class="thoughts-box" id="thoughtsContainer">Loading thoughts...</div>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user) window.location.href = 'index.html';

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  async function loadThoughts() {
    try {
      const res = await fetch(`${API_URL}/thoughts`);
      const data = await res.json();
      const container = document.getElementById('thoughtsContainer');

      if (!Array.isArray(data) || data.length === 0) {
        container.textContent = 'No thoughts posted yet.';
        return;
      }

      container.innerHTML = data.map(t => `
        <div class="thought">
          <strong>${t.resident_name || 'Anonymous'}</strong><br>
          ${t.content || t.message}<br>
          <small>${new Date(t.created_at).toLocaleString()}</small>
        </div>
      `).join('');
    } catch {
      document.getElementById('thoughtsContainer').textContent = '❌ Failed to load thoughts.';
    }
  }

  document.getElementById('thoughtForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('thoughtText').value.trim();
    const feedback = document.getElementById('feedback');
    if (!text) return;

    try {
      const res = await fetch(`${API_URL}/thoughts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resident_id: user.id, content: text })
      });

      if (!res.ok) throw new Error();
      feedback.style.color = 'green';
      feedback.textContent = '✅ Thought posted!';
      document.getElementById('thoughtText').value = '';
      loadThoughts();
    } catch {
      feedback.style.color = 'red';
      feedback.textContent = '❌ Failed to post thought.';
    }
  });

  loadThoughts();
</script>

</body>
</html>
