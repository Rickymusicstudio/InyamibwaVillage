<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Inyamibwa Cell</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f7fcff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    form {
      background-color: white;
      padding: 25px;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #004080;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      background-color: #006633;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #004d26;
    }
    #message {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<form id="registerForm">
  <h2>Register as a Resident</h2>

  <label for="full_name">Full Name</label>
  <input type="text" id="full_name" required>

  <label for="national_id">National ID</label>
  <input type="text" id="national_id" required>

  <label for="phone_number">Phone Number</label>
  <input type="text" id="phone_number">

  <label for="email">Email</label>
  <input type="email" id="email">

  <label for="resident_type">Resident Type</label>
  <select id="resident_type" required>
    <option value="">Select type</option>
    <option value="permanent">Permanent</option>
    <option value="renter">Renter</option>
    <option value="house_worker">House Worker</option>
  </select>

  <label for="house">House</label>
  <input type="text" id="house">

  <label for="isibo">Isibo (Street)</label>
  <input type="text" id="isibo">

  <label>
    <input type="checkbox" id="has_house_worker"> Has House Worker
  </label>

  <button type="submit">Register</button>
  <div id="message"></div>
</form>

<script>
  const form = document.getElementById('registerForm');
  const message = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
      full_name: document.getElementById('full_name').value.trim(),
      national_id: document.getElementById('national_id').value.trim(),
      phone_number: document.getElementById('phone_number').value.trim(),
      email: document.getElementById('email').value.trim(),
      resident_type: document.getElementById('resident_type').value,
      house: document.getElementById('house').value.trim(),
      isibo: document.getElementById('isibo').value.trim(),
      has_house_worker: document.getElementById('has_house_worker').checked
    };

    try {
      const res = await fetch('http://127.0.0.1:5000/residents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (!res.ok) {
        message.style.color = 'red';
        message.textContent = result.error || 'Registration failed';
        return;
      }

      message.style.color = 'green';
      message.textContent = '✅ Registered! Redirecting to login...';

      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (err) {
      message.style.color = 'red';
      message.textContent = '❌ Server error during registration.';
    }
  });
</script>

</body>
</html>
