<!DOCTYPE html>
<html>
<head>
  <title>Manage Cell Leader</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7faff;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #003366;
    }
    form {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #007f3f;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    #deleteBtn {
      background: #c62828;
      margin: 10px auto;
      display: block;
    }
    #message {
      text-align: center;
      font-weight: bold;
      margin-top: 15px;
    }
    .info-box {
      max-width: 500px;
      margin: 20px auto;
      background: #e7f5e7;
      padding: 15px;
      border-left: 5px solid #007f3f;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<h2>Manage Umukuru w’Umudugudu</h2>

<div id="leaderInfo" class="info-box">Loading current leader...</div>
<button id="deleteBtn" style="display:none;">Delete Leader</button>

<form id="leaderForm">
  <label>Full Name</label>
  <input type="text" id="full_name" required>

  <label>Phone Number</label>
  <input type="text" id="phone_number" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <button type="submit">Save / Replace Leader</button>

  <div id="message"></div>
</form>

<script>
  const user = JSON.parse(localStorage.getItem('loggedUser'));
  if (!user || user.role !== 'admin') {
    alert('Access denied: Admins only');
    window.location.href = 'index.html';
  }

  const API_URL = window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:5000'
    : 'https://inyamibwa-backend.onrender.com';

  let currentLeaderId = null;
  const form = document.getElementById('leaderForm');
  const message = document.getElementById('message');

  async function loadLeader() {
    try {
      const res = await fetch(`${API_URL}/leader`);
      const leader = await res.json();

      if (leader.full_name || leader.names) {
        currentLeaderId = leader.id;
        document.getElementById('leaderInfo').innerHTML = `
          <strong>${leader.full_name || leader.names}</strong><br>
          📞 ${leader.phone_number || leader.phone}<br>
          ✉️ ${leader.email || '-'}<br>
          Added on: ${new Date(leader.created_at).toLocaleString()}
        `;
        document.getElementById('deleteBtn').style.display = 'block';

        document.getElementById('full_name').value = leader.full_name || '';
        document.getElementById('phone_number').value = leader.phone_number || '';
        document.getElementById('email').value = leader.email || '';
      } else {
        document.getElementById('leaderInfo').textContent = 'No leader found yet.';
        document.getElementById('deleteBtn').style.display = 'none';
      }
    } catch {
      document.getElementById('leaderInfo').textContent = '❌ Failed to load leader.';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      full_name: document.getElementById('full_name').value.trim(),
      phone_number: document.getElementById('phone_number').value.trim(),
      email: document.getElementById('email').value.trim()
    };

    try {
      const res = await fetch(`${API_URL}/leader`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!res.ok) throw new Error();
      message.style.color = 'green';
      message.textContent = '✅ Leader saved successfully!';
      form.reset();
      loadLeader();
    } catch {
      message.style.color = 'red';
      message.textContent = '❌ Failed to save leader.';
    }
  });

  document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!confirm('Are you sure you want to delete the leader?')) return;
    try {
      const res = await fetch(`${API_URL}/leader/${currentLeaderId}`, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error();
      message.style.color = 'green';
      message.textContent = '✅ Leader deleted!';
      form.reset();
      loadLeader();
    } catch {
      message.style.color = 'red';
      message.textContent = '❌ Failed to delete leader.';
    }
  });

  loadLeader();
</script>

</body>
</html>
